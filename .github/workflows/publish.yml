name: Publish to PyPI and GitHub Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # Required for creating release and uploading assets

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Configure signing environment (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          if ("${{ secrets.SIGNING_CERT }}" -ne "") {
              $certBytes = [System.Convert]::FromBase64String("${{ secrets.SIGNING_CERT }}")
              [System.IO.File]::WriteAllBytes("${{ github.workspace }}/cert.pfx", $certBytes)
              echo "CIBW_ENVIRONMENT_WINDOWS=BUILD_PYTHON_PACKAGE=ON SIGN_BINARY=ON SIGN_CERT_PATH='${{ github.workspace }}/cert.pfx' SIGN_CERT_PASSWORD='${{ secrets.SIGNING_CERT_PASSWORD }}'" >> $env:GITHUB_ENV
          } else {
              echo "CIBW_ENVIRONMENT_WINDOWS=BUILD_PYTHON_PACKAGE=ON" >> $env:GITHUB_ENV
          }

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        env:
          CIBW_BUILD_FRONTEND: "build"
          # Skip 32-bit builds on Linux, macOS, and Windows, build only 64-bit to align with Zydis/PE architecture support
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_i686 *-win32 cp36-* cp37-* pp*"
          CIBW_ENVIRONMENT: "BUILD_PYTHON_PACKAGE=ON"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/makne
    permissions:
      id-token: write # Required for trusted publishing OIDC
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
